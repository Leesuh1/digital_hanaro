      <rect x="868" y="308" width="138" height="58" rx="16" fill="#F8FBFF"/>
      <circle cx="891" cy="330" r="7" fill="#00B7A8"/>
      <text x="907" y="335" fill="#132238" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700">채권 ETF</text>
      <text x="891" y="354" fill="#54657D" font-family="'Segoe UI', Arial, sans-serif" font-size="15">30% 변동성 완화</text>
    </g>
    <g>
      <rect x="868" y="377" width="138" height="58" rx="16" fill="#F8FBFF"/>
      <circle cx="891" cy="399" r="7" fill="#F0B24F"/>
      <text x="907" y="404" fill="#132238" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700">현금 비중</text>
      <text x="891" y="423" fill="#54657D" font-family="'Segoe UI', Arial, sans-serif" font-size="15">15% 유연한 대응</text>
    </g>

    <rect x="675" y="395" width="171" height="40" rx="16" fill="#F8FBFF"/>
    <text x="693" y="420" fill="#54657D" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700">왜 이렇게 구성됐을까?</text>
  </g>
</svg>
