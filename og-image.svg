<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="70" y1="44" x2="1118" y2="612" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#EEF4FB"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(213 73) rotate(38.5288) scale(369.224 255.833)">
      <stop stop-color="#1D63FF" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#1D63FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowMint" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(968 121) rotate(145.287) scale(274.165 177.531)">
      <stop stop-color="#00B7A8" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#00B7A8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardBorder" x1="653" y1="134" x2="1024" y2="487" gradientUnits="userSpaceOnUse">
      <stop stop-color="white"/>
      <stop offset="1" stop-color="#DFE8F5"/>
    </linearGradient>
    <linearGradient id="pill" x1="875" y1="183" x2="959" y2="209" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1D63FF"/>
